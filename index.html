<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zincosoft — Tarjeta Digital</title>
  <meta name="description" content="Tarjeta de presentación digital de Zincosoft. Contacto directo por correo, teléfono, WhatsApp y LinkedIn." />
  <meta property="og:title" content="Zincosoft — Tarjeta Digital" />
  <meta property="og:description" content="Software a la medida para tu negocio. Contáctanos." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💠</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' } },
          animation: { rise: 'rise .7s cubic-bezier(.16,1,.3,1) both' },
          keyframes: { rise: { '0%': { opacity: 0, transform: 'translateY(16px) scale(.98)' }, '100%': { opacity: 1, transform: 'none' } } }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen overflow-x-hidden bg-slate-950 text-slate-100 antialiased">

  <!-- ════════════════════════════════════════════════════════════════
       ⚠️  EDITA SOLO ESTE BLOQUE CON TUS DATOS REALES
       ════════════════════════════════════════════════════════════════ -->
  <script>
    const DATOS = {
      empresa:   "Zincosoft",
      persona:   "Julio Campos",
      cargo:     "Fundador & Desarrollador de Software",
      lema:      "Software a la medida para tu negocio",

      correo:    "contacto@zincosoft.com",
      telefono:  "+52 55 1234 5678",              // como se muestra
      telTel:    "+525512345678",                 // para el link tel: (sin espacios)
      whatsapp:  "525512345678",                  // solo dígitos, con código de país
      waMensaje: "Hola Zincosoft, vi su tarjeta digital y me gustaría cotizar un proyecto.",
      linkedin:  "https://www.linkedin.com/in/tu-usuario",
      web:       "https://zincosoft.com",

      // URL pública de ESTA tarjeta (lo que codifica el QR).
      // Déjalo vacío "" y usará automáticamente la URL donde esté publicada.
      urlTarjeta: ""
    };
  </script>
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- Fondo -->
  <div class="pointer-events-none fixed inset-0 bg-[radial-gradient(ellipse_at_top,rgba(14,165,233,.18),transparent_60%)]"></div>

  <main class="relative flex min-h-screen items-center justify-center p-4 sm:p-8">
    <div class="w-full max-w-2xl animate-rise">

      <article class="overflow-hidden rounded-3xl border border-white/10 bg-slate-900/80 shadow-2xl shadow-black/50 backdrop-blur-xl">

        <div class="grid gap-px bg-white/5 sm:grid-cols-[1.4fr_1fr]">

          <!-- ── Columna izquierda: identidad + botones ─────────────── -->
          <div class="min-w-0 bg-slate-900 p-5 sm:p-9">

            <div class="flex items-center gap-3 sm:gap-4">
              <div class="grid h-11 w-11 shrink-0 place-items-center rounded-xl bg-gradient-to-br from-brand-500 to-cyan-400 text-base font-black tracking-tight text-slate-950 sm:h-12 sm:w-12 sm:text-lg">
                ZS
              </div>
              <div class="min-w-0 flex-1">
                <h1 id="empresa" class="text-xl font-bold leading-tight tracking-tight"></h1>
                <p id="lema" class="text-[10px] font-medium uppercase leading-snug tracking-wider text-brand-400 sm:text-[11px]"></p>
              </div>
            </div>

            <div class="mt-5 sm:mt-6">
              <p id="persona" class="text-lg font-semibold"></p>
              <p id="cargo" class="text-sm text-slate-400"></p>
            </div>

            <!-- ── BOTONES: una sola fila horizontal ───────────────── -->
            <nav aria-label="Contacto" class="mt-6 flex items-center gap-2 sm:mt-7 sm:justify-start sm:gap-3">

              <a id="a-correo" href="#" title="Enviar correo" aria-label="Enviar correo"
                 class="group grid h-12 flex-1 basis-0 place-items-center rounded-xl sm:w-12 sm:flex-none border border-white/10 bg-slate-800 text-slate-300 transition hover:-translate-y-0.5 hover:border-brand-400/70 hover:bg-brand-500/15 hover:text-brand-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-400">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
              </a>

              <a id="a-tel" href="#" title="Llamar" aria-label="Llamar por teléfono"
                 class="group grid h-12 flex-1 basis-0 place-items-center rounded-xl sm:w-12 sm:flex-none border border-white/10 bg-slate-800 text-slate-300 transition hover:-translate-y-0.5 hover:border-brand-400/70 hover:bg-brand-500/15 hover:text-brand-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-400">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/></svg>
              </a>

              <a id="a-wa" href="#" target="_blank" rel="noopener" title="WhatsApp" aria-label="Escribir por WhatsApp"
                 class="group grid h-12 flex-1 basis-0 place-items-center rounded-xl sm:w-12 sm:flex-none border border-white/10 bg-slate-800 text-slate-300 transition hover:-translate-y-0.5 hover:border-emerald-400/70 hover:bg-emerald-500/15 hover:text-emerald-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.372-.025-.521-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884a9.82 9.82 0 0 1 6.988 2.896 9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.885-9.885 9.885M20.52 3.449C18.24 1.245 15.24 0 12.045 0 5.463 0 .104 5.359.101 11.944c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.652a11.9 11.9 0 0 0 5.71 1.454h.005c6.585 0 11.946-5.359 11.949-11.945a11.9 11.9 0 0 0-3.479-8.408"/></svg>
              </a>

              <a id="a-li" href="#" target="_blank" rel="noopener" title="LinkedIn" aria-label="Perfil de LinkedIn"
                 class="group grid h-12 flex-1 basis-0 place-items-center rounded-xl sm:w-12 sm:flex-none border border-white/10 bg-slate-800 text-slate-300 transition hover:-translate-y-0.5 hover:border-sky-400/70 hover:bg-sky-500/15 hover:text-sky-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-sky-400">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286ZM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065Zm1.782 13.019H3.555V9h3.564v11.452ZM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003Z"/></svg>
              </a>

              <a id="a-web" href="#" target="_blank" rel="noopener" title="Sitio web" aria-label="Visitar sitio web"
                 class="group grid h-12 flex-1 basis-0 place-items-center rounded-xl sm:w-12 sm:flex-none border border-white/10 bg-slate-800 text-slate-300 transition hover:-translate-y-0.5 hover:border-violet-400/70 hover:bg-violet-500/15 hover:text-violet-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-400">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 1 0 0-18m0 18a9 9 0 0 1 0-18m0 18c2.485 0 4.5-4.03 4.5-9s-2.015-9-4.5-9m0 18c-2.485 0-4.5-4.03-4.5-9s2.015-9 4.5-9M3.6 9h16.8M3.6 15h16.8"/></svg>
              </a>

            </nav>

            <!-- Datos en texto -->
            <dl class="mt-6 space-y-2 border-t border-white/10 pt-5 text-sm sm:mt-7">
              <div class="flex items-baseline justify-between gap-4">
                <dt class="shrink-0 text-slate-500">Correo</dt>
                <dd id="t-correo" class="min-w-0 truncate text-right font-medium text-slate-300"></dd>
              </div>
              <div class="flex items-baseline justify-between gap-4">
                <dt class="shrink-0 text-slate-500">Teléfono</dt>
                <dd id="t-tel" class="min-w-0 truncate text-right font-medium text-slate-300"></dd>
              </div>
              <div class="flex items-baseline justify-between gap-4">
                <dt class="shrink-0 text-slate-500">Web</dt>
                <dd id="t-web" class="min-w-0 truncate text-right font-medium text-slate-300"></dd>
              </div>
            </dl>
          </div>

          <!-- ── Columna derecha: QR ───────────────────────────────── -->
          <aside class="flex min-w-0 flex-col items-center justify-center gap-4 bg-slate-900 p-5 text-center sm:p-8">
            <div class="rounded-2xl bg-white p-3 shadow-xl shadow-black/40">
              <canvas id="qr" class="block h-32 w-32 sm:h-36 sm:w-36" aria-label="Código QR de la tarjeta digital de Zincosoft"></canvas>
            </div>
            <p class="text-[11px] font-medium uppercase tracking-widest text-slate-500">Escanea para guardar</p>

            <div class="flex w-full max-w-xs flex-col gap-2">
              <button id="btn-vcard" class="rounded-lg bg-brand-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-brand-400 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-300">
                Guardar contacto
              </button>
              <button id="btn-share" class="rounded-lg border border-white/15 bg-slate-800 px-4 py-3 text-sm font-semibold text-slate-300 transition hover:bg-slate-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400">
                Compartir
              </button>
            </div>
          </aside>

        </div>
      </article>

      <p class="mt-6 text-center text-xs text-slate-600">
        © <span id="anio"></span> Zincosoft
      </p>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const urlTarjeta = DATOS.urlTarjeta || location.href.split('#')[0];

    $('empresa').textContent = DATOS.empresa;
    $('persona').textContent = DATOS.persona;
    $('cargo').textContent   = DATOS.cargo;
    $('lema').textContent    = DATOS.lema;
    $('anio').textContent    = new Date().getFullYear();

    $('a-correo').href = `mailto:${DATOS.correo}`;
    $('a-tel').href    = `tel:${DATOS.telTel}`;
    $('a-wa').href     = `https://wa.me/${DATOS.whatsapp}?text=${encodeURIComponent(DATOS.waMensaje)}`;
    $('a-li').href     = DATOS.linkedin;
    $('a-web').href    = DATOS.web;

    $('t-correo').textContent = DATOS.correo;
    $('t-tel').textContent    = DATOS.telefono;
    $('t-web').textContent    = DATOS.web.replace(/^https?:\/\//, '');

    // QR con la URL de la tarjeta. Si el CDN principal no cargó, se intenta uno de respaldo.
    function pintarQR() {
      QRCode.toCanvas($('qr'), urlTarjeta, {
        width: 288, margin: 1, errorCorrectionLevel: 'M',
        color: { dark: '#0F172A', light: '#FFFFFF' }
      }, (err) => { if (err) fallaQR(); });
    }

    function fallaQR() {
      const c = $('qr');
      c.outerHTML = '<p class="flex h-32 w-32 items-center justify-center p-2 text-center text-[11px] font-medium leading-snug text-slate-500 sm:h-36 sm:w-36">No se pudo generar el QR (sin conexión)</p>';
    }

    if (typeof QRCode !== 'undefined') {
      pintarQR();
    } else {
      const respaldo = document.createElement('script');
      respaldo.src = 'https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js';
      respaldo.onload = pintarQR;
      respaldo.onerror = fallaQR;
      document.head.appendChild(respaldo);
    }

    $('btn-vcard').addEventListener('click', () => {
      const partes = DATOS.persona.trim().split(/\s+/);
      const vcf = [
        'BEGIN:VCARD', 'VERSION:3.0',
        `N:${partes.slice(1).join(' ')};${partes[0]};;;`,
        `FN:${DATOS.persona}`,
        `ORG:${DATOS.empresa}`,
        `TITLE:${DATOS.cargo}`,
        `TEL;TYPE=CELL:${DATOS.telTel}`,
        `EMAIL;TYPE=WORK:${DATOS.correo}`,
        `URL:${DATOS.web}`,
        `NOTE:${DATOS.lema}`,
        'END:VCARD'
      ].join('\r\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([vcf], { type: 'text/vcard' }));
      a.download = `${DATOS.empresa}.vcf`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    $('btn-share').addEventListener('click', async () => {
      const btn = $('btn-share');
      const data = { title: `${DATOS.empresa} — Tarjeta digital`, text: DATOS.lema, url: urlTarjeta };
      if (navigator.share) { try { await navigator.share(data); } catch {} return; }
      await navigator.clipboard.writeText(urlTarjeta);
      const original = btn.textContent;
      btn.textContent = '¡Enlace copiado!';
      setTimeout(() => (btn.textContent = original), 1800);
    });
  </script>
</body>
</html>
