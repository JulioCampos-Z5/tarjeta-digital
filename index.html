<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zincosoft — Tarjeta Digital</title>
  <meta name="description" content="Tarjeta de presentación digital de Zincosoft. Contacto directo por correo, teléfono, WhatsApp y LinkedIn." />
  <meta property="og:title" content="Zincosoft — Tarjeta Digital" />
  <meta property="og:description" content="Contáctanos por correo, teléfono, WhatsApp o LinkedIn." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💠</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { zinc0: '#0B1120', brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' } },
          animation: { 'fade-up': 'fadeUp .6s ease-out both' },
          keyframes: { fadeUp: { '0%': { opacity: 0, transform: 'translateY(12px)' }, '100%': { opacity: 1, transform: 'none' } } }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">

  <!-- ════════════════════════════════════════════════════════════════
       ⚠️  EDITA SOLO ESTE BLOQUE CON TUS DATOS REALES
       ════════════════════════════════════════════════════════════════ -->
  <script>
    const DATOS = {
      empresa:   "Zincosoft",
      persona:   "Julio Campos",
      cargo:     "Fundador & Desarrollador de Software",
      lema:      "Software a la medida para tu negocio",

      correo:    "contacto@zincosoft.com",
      telefono:  "+52 55 1234 5678",              // como se muestra
      telTel:    "+525512345678",                 // para el link tel: (sin espacios)
      whatsapp:  "525512345678",                  // solo dígitos, con código de país
      waMensaje: "Hola Zincosoft, vi su tarjeta digital y me gustaría cotizar un proyecto.",
      linkedin:  "https://www.linkedin.com/in/tu-usuario",
      web:       "https://zincosoft.com",

      // URL pública de ESTA tarjeta (lo que codifica el QR).
      // Déjalo vacío "" y usará automáticamente la URL donde esté publicada.
      urlTarjeta: ""
    };
  </script>
  <!-- ════════════════════════════════════════════════════════════════ -->

  <main class="flex min-h-screen items-center justify-center p-4 sm:p-6">
    <div class="w-full max-w-md animate-fade-up">

      <!-- Tarjeta -->
      <div class="relative overflow-hidden rounded-3xl border border-white/10 bg-slate-900/70 shadow-2xl shadow-brand-500/10 backdrop-blur">

        <!-- Cabecera con degradado -->
        <div class="relative h-28 bg-gradient-to-br from-brand-600 via-brand-500 to-cyan-400">
          <div class="absolute inset-0 opacity-30 [background-image:radial-gradient(circle_at_20%_20%,white_1px,transparent_1px)] [background-size:16px_16px]"></div>
        </div>

        <!-- Logo / avatar -->
        <div class="-mt-12 flex justify-center">
          <div class="grid h-24 w-24 place-items-center rounded-2xl border-4 border-slate-900 bg-slate-800 text-3xl font-black tracking-tight text-brand-400 shadow-lg">
            ZS
          </div>
        </div>

        <!-- Identidad -->
        <header class="px-6 pt-4 text-center">
          <h1 id="empresa" class="text-2xl font-bold tracking-tight"></h1>
          <p id="persona" class="mt-1 text-sm font-medium text-slate-300"></p>
          <p id="cargo" class="text-sm text-slate-400"></p>
          <p id="lema" class="mt-3 text-xs uppercase tracking-widest text-brand-400"></p>
        </header>

        <!-- Botones de contacto -->
        <nav class="grid gap-3 px-6 py-6">

          <a id="a-correo" href="#" class="group flex items-center gap-4 rounded-xl border border-white/10 bg-slate-800/60 px-4 py-3 transition hover:border-brand-400/60 hover:bg-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-400">
            <span class="grid h-10 w-10 shrink-0 place-items-center rounded-lg bg-brand-500/15 text-brand-400">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
            </span>
            <span class="min-w-0 flex-1">
              <span class="block text-sm font-semibold">Correo</span>
              <span id="t-correo" class="block truncate text-xs text-slate-400"></span>
            </span>
            <svg class="h-4 w-4 shrink-0 text-slate-500 transition group-hover:translate-x-0.5 group-hover:text-brand-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m9 5 7 7-7 7"/></svg>
          </a>

          <a id="a-tel" href="#" class="group flex items-center gap-4 rounded-xl border border-white/10 bg-slate-800/60 px-4 py-3 transition hover:border-brand-400/60 hover:bg-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-400">
            <span class="grid h-10 w-10 shrink-0 place-items-center rounded-lg bg-brand-500/15 text-brand-400">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/></svg>
            </span>
            <span class="min-w-0 flex-1">
              <span class="block text-sm font-semibold">Teléfono</span>
              <span id="t-tel" class="block truncate text-xs text-slate-400"></span>
            </span>
            <svg class="h-4 w-4 shrink-0 text-slate-500 transition group-hover:translate-x-0.5 group-hover:text-brand-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m9 5 7 7-7 7"/></svg>
          </a>

          <a id="a-wa" href="#" target="_blank" rel="noopener" class="group flex items-center gap-4 rounded-xl border border-white/10 bg-slate-800/60 px-4 py-3 transition hover:border-emerald-400/60 hover:bg-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400">
            <span class="grid h-10 w-10 shrink-0 place-items-center rounded-lg bg-emerald-500/15 text-emerald-400">
              <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.372-.025-.521-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884a9.82 9.82 0 0 1 6.988 2.896 9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.885-9.885 9.885M20.52 3.449C18.24 1.245 15.24 0 12.045 0 5.463 0 .104 5.359.101 11.944c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.652a11.9 11.9 0 0 0 5.71 1.454h.005c6.585 0 11.946-5.359 11.949-11.945a11.9 11.9 0 0 0-3.479-8.408"/></svg>
            </span>
            <span class="min-w-0 flex-1">
              <span class="block text-sm font-semibold">WhatsApp</span>
              <span class="block truncate text-xs text-slate-400">Escríbenos ahora</span>
            </span>
            <svg class="h-4 w-4 shrink-0 text-slate-500 transition group-hover:translate-x-0.5 group-hover:text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m9 5 7 7-7 7"/></svg>
          </a>

          <a id="a-li" href="#" target="_blank" rel="noopener" class="group flex items-center gap-4 rounded-xl border border-white/10 bg-slate-800/60 px-4 py-3 transition hover:border-sky-400/60 hover:bg-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-sky-400">
            <span class="grid h-10 w-10 shrink-0 place-items-center rounded-lg bg-sky-500/15 text-sky-400">
              <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286ZM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065Zm1.782 13.019H3.555V9h3.564v11.452ZM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003Z"/></svg>
            </span>
            <span class="min-w-0 flex-1">
              <span class="block text-sm font-semibold">LinkedIn</span>
              <span class="block truncate text-xs text-slate-400">Conectemos</span>
            </span>
            <svg class="h-4 w-4 shrink-0 text-slate-500 transition group-hover:translate-x-0.5 group-hover:text-sky-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m9 5 7 7-7 7"/></svg>
          </a>

          <a id="a-web" href="#" target="_blank" rel="noopener" class="group flex items-center gap-4 rounded-xl border border-white/10 bg-slate-800/60 px-4 py-3 transition hover:border-violet-400/60 hover:bg-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-400">
            <span class="grid h-10 w-10 shrink-0 place-items-center rounded-lg bg-violet-500/15 text-violet-400">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 1 0 0-18m0 18a9 9 0 0 1 0-18m0 18c2.485 0 4.5-4.03 4.5-9s-2.015-9-4.5-9m0 18c-2.485 0-4.5-4.03-4.5-9s2.015-9 4.5-9M3.6 9h16.8M3.6 15h16.8"/></svg>
            </span>
            <span class="min-w-0 flex-1">
              <span class="block text-sm font-semibold">Sitio web</span>
              <span id="t-web" class="block truncate text-xs text-slate-400"></span>
            </span>
            <svg class="h-4 w-4 shrink-0 text-slate-500 transition group-hover:translate-x-0.5 group-hover:text-violet-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m9 5 7 7-7 7"/></svg>
          </a>

        </nav>

        <!-- QR -->
        <section class="border-t border-white/10 bg-slate-900/60 px-6 py-6 text-center">
          <p class="text-xs font-medium uppercase tracking-widest text-slate-400">Escanea para compartir</p>
          <div class="mt-4 inline-block rounded-2xl bg-white p-3 shadow-lg">
            <canvas id="qr" class="block h-40 w-40" aria-label="Código QR de la tarjeta digital de Zincosoft"></canvas>
          </div>
          <p id="qr-url" class="mt-3 break-all text-[11px] text-slate-500"></p>

          <div class="mt-5 flex flex-col gap-2 sm:flex-row sm:justify-center">
            <button id="btn-vcard" class="rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-400 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-300">
              Guardar contacto
            </button>
            <button id="btn-share" class="rounded-lg border border-white/15 bg-slate-800 px-4 py-2.5 text-sm font-semibold text-slate-200 transition hover:bg-slate-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400">
              Compartir tarjeta
            </button>
          </div>
        </section>
      </div>

      <p class="mt-6 text-center text-xs text-slate-600">
        © <span id="anio"></span> Zincosoft. Todos los derechos reservados.
      </p>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const urlTarjeta = DATOS.urlTarjeta || location.href.split('#')[0];

    // Textos
    $('empresa').textContent = DATOS.empresa;
    $('persona').textContent = DATOS.persona;
    $('cargo').textContent   = DATOS.cargo;
    $('lema').textContent    = DATOS.lema;
    $('anio').textContent    = new Date().getFullYear();

    // Enlaces
    $('a-correo').href = `mailto:${DATOS.correo}`;
    $('t-correo').textContent = DATOS.correo;

    $('a-tel').href = `tel:${DATOS.telTel}`;
    $('t-tel').textContent = DATOS.telefono;

    $('a-wa').href = `https://wa.me/${DATOS.whatsapp}?text=${encodeURIComponent(DATOS.waMensaje)}`;
    $('a-li').href = DATOS.linkedin;

    $('a-web').href = DATOS.web;
    $('t-web').textContent = DATOS.web.replace(/^https?:\/\//, '');

    // QR con la URL de la tarjeta
    QRCode.toCanvas($('qr'), urlTarjeta, {
      width: 320, margin: 1, errorCorrectionLevel: 'M',
      color: { dark: '#0B1120', light: '#FFFFFF' }
    });
    $('qr-url').textContent = urlTarjeta.replace(/^https?:\/\//, '');

    // vCard descargable
    $('btn-vcard').addEventListener('click', () => {
      const vcf = [
        'BEGIN:VCARD', 'VERSION:3.0',
        `N:${DATOS.persona.split(' ').slice(-1)};${DATOS.persona.split(' ')[0]};;;`,
        `FN:${DATOS.persona}`,
        `ORG:${DATOS.empresa}`,
        `TITLE:${DATOS.cargo}`,
        `TEL;TYPE=CELL:${DATOS.telTel}`,
        `EMAIL;TYPE=WORK:${DATOS.correo}`,
        `URL:${DATOS.web}`,
        `URL;TYPE=LinkedIn:${DATOS.linkedin}`,
        `NOTE:${DATOS.lema}`,
        'END:VCARD'
      ].join('\r\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([vcf], { type: 'text/vcard' }));
      a.download = `${DATOS.empresa}.vcf`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // Compartir (nativo en móvil, copia el link en escritorio)
    $('btn-share').addEventListener('click', async () => {
      const btn = $('btn-share');
      const data = { title: `${DATOS.empresa} — Tarjeta digital`, text: DATOS.lema, url: urlTarjeta };
      if (navigator.share) { try { await navigator.share(data); } catch {} return; }
      await navigator.clipboard.writeText(urlTarjeta);
      const original = btn.textContent;
      btn.textContent = '¡Enlace copiado!';
      setTimeout(() => (btn.textContent = original), 1800);
    });
  </script>
</body>
</html>
